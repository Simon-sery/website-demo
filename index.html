<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slikbutik</title>
    <link rel="stylesheet" href="slikbutik.css" />
  </head>
  <body>
    <header class="header">
      <div class="top-navigation">
        <button id="menuBtn">Åbn menu</button>
        <div class="header-text">
          <h1>Slikbutikken</h1>
          <p>Velkommen til Slikbutikken.dk</p>
          <p id="status">Status:</p>
        </div>
      </div>

      <nav class="offcanvas" id="offcanvasmenu">
        <button id="closeBtn">luk</button>
        <ul>
          <li><a href="#">Forside</a></li>
          <li><a href="#">Om os</a></li>
          <li><a href="#">Kontakt</a></li>
        </ul>
      </nav>
    </header>
    <div class="slideshow-container">
      <div class="slide">
        <img src="brooke-lark-8beTH4VkhLI-unsplash.jpg" alt="kat" />
        <div class="caption">Photo: Is</div>
      </div>
      <div class="slide">
        <img src="lama-roscu-Wpg3Qm0zaGk-unsplash.jpg" alt="kat" />
        <div class="caption">Photo: Jordbær is</div>
      </div>
      <div class="slide">
        <img src="zach-camp-3D0HUHFcRrk-unsplash.jpg" alt="kat" />
        <div class="caption">Photo: Chokolade is</div>
      </div>
      <a class="prev">&#10094;</a>
      <a class="next">&#10095;</a>
    </div>

    <main class="container">
      <section class="filters">
        <h2>Vælg kategori</h2>
        <button data-category="all">Alle</button>
        <button data-category="drink">Drikke</button>
        <button data-category="dessert">Dessert</button>
      </section>

      <section>
        <h2>Vores produkter</h2>
        <div id="product-container" class="product-grid"></div>
      </section>

      <section class="cart-section">
        <div class="cart-header">
          <h2>Din kurv</h2>
          <button id="toggle-cart-btn">Vis / skjul kurv</button>
        </div>

        <div id="cart-box">
          <ul id="cart-items"></ul>
          <p id="total">Total: 0 kr</p>
          <button id="order-btn">Bestil</button>
        </div>
      </section>
    </main>

    <script src="slikbutik.js"></script>
  </body>
</html>
